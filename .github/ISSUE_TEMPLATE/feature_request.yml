name: Feature Request
description: 提交功能建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 先描述痛点，再描述功能
      placeholder: 例如：批量总结时无法按来源分组，不便发布...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      placeholder: 例如：新增按 domain 分组输出...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如有其他思路可一起说明
